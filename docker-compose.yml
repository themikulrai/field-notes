services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-field_notes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-field_notes}
      POSTGRES_DB: ${POSTGRES_DB:-field_notes}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-field_notes}"]
      interval: 3s
      timeout: 3s
      retries: 20
  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    environment:
      FIELD_NOTES_KEY: ${FIELD_NOTES_KEY:-changeme}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-field_notes}:${POSTGRES_PASSWORD:-field_notes}@postgres:5432/${POSTGRES_DB:-field_notes}
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["8000:8000"]
  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./apps/web:/app
    ports: ["5173:5173"]
    environment:
      VITE_API_URL: http://localhost:8000
volumes:
  pgdata: {}
