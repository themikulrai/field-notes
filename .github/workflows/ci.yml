name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: field_notes
          POSTGRES_PASSWORD: field_notes
          POSTGRES_DB: field_notes
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U field_notes"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      # Default to SQLite for the bulk of the suite; one job below could matrix
      # in a postgres URL if desired. Keeping the suite portable is intentional.
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      FIELD_NOTES_KEY: "ci-test-key"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install "uv==0.11.*"
      - name: uv sync
        # --all-packages --all-groups so each workspace member's dev group
        # (ruff, pytest, aiosqlite) is installed, not just the root project.
        run: uv sync --frozen --all-extras --all-packages --all-groups
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .
      - name: pytest
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - name: npm ci
        run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: vitest
        run: npm run test
      - name: vite build
        run: npm run build
