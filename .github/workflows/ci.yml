name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: field_notes
          POSTGRES_PASSWORD: field_notes
          POSTGRES_DB: field_notes
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U field_notes"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      # Default to SQLite for the bulk of the suite; one job below could matrix
      # in a postgres URL if desired. Keeping the suite portable is intentional.
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      FIELD_NOTES_KEY: "ci-test-key"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv==0.5.*
      - name: uv sync
        run: uv sync --frozen --all-extras
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .
      - name: pytest
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - name: npm ci
        run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: vitest
        run: npm run test
      - name: vite build
        run: npm run build

  deploy:
    # Only run on direct push to main and only if the deploy token is configured.
    # Forks / PR builds don't have access to secrets so this skips automatically.
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: deploy-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Ensure FLY_API_TOKEN is set
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN is not set; skipping deploy. Add the secret to enable."
            exit 0
          fi
          flyctl deploy --config deploy/fly.toml --remote-only
