[project]
name = "field-notes-schema"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.9"]

[dependency-groups]
dev = ["pytest>=8.0", "ruff>=0.8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["field_notes_schema"]
